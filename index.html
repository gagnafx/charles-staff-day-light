<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles Staff Day Light</title>
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; --text: #f4f4f4; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg); color: var(--text); }
        header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); }
        .logo-display { width: 200px; height: 200px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; display: block; margin: 0 auto; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .work-item { width: 100%; height: 250px; object-fit: cover; border: 2px solid var(--gold); display: block; }
        .item-container { border: 1px solid #333; padding: 10px; background: #111; text-align: center; }
    </style>
</head>
<body>

<header><h1>CHARLES STAFF DAY LIGHT</h1></header>

<div style="text-align: center; margin-top: 20px;">
    <img src="1001855070.jpg" alt="Logo" class="logo-display">
</div>

<div class="gallery" id="gallery"></div>

<script>
    function renderGallery() {
        const galleryFiles = [
            { src: 'video1.mp4', type: 'video/mp4', desc: 'Vidéo 1' },
            { src: 'video2.mp4', type: 'video/mp4', desc: 'Vidéo 2' },
            { src: 'image1.jpg', type: 'image/jpeg', desc: 'Image 1' },
            { src: 'image2.jpg', type: 'image/jpeg', desc: 'Image 2' },
            { src: 'image3.jpg', type: 'image/jpeg', desc: 'Image 3' },
            { src: 'image4.jpg', type: 'image/jpeg', desc: 'Image 4' },
            { src: 'image5.jpg', type: 'image/jpeg', desc: 'Image 5' },
            { src: 'image6.jpg', type: 'image/jpeg', desc: 'Image 6' },
            { src: 'image7.jpg', type: 'image/jpeg', desc: 'Image 7' },
            { src: 'image8.jpg', type: 'image/jpeg', desc: 'Image 8' },
            { src: 'image9.jpg', type: 'image/jpeg', desc: 'Image 9' },
            { src: 'image10.jpg', type: 'image/jpeg', desc: 'Image 10' }
        ];

        let container = document.getElementById('gallery');
        galleryFiles.forEach((item) => {
            let div = document.createElement('div');
            div.className = 'item-container';
            div.innerHTML = (item.type.includes('video') ? 
                `<video class="work-item" controls src="${item.src}"></video>` : 
                `<img class="work-item" src="${item.src}">`) + `<p>${item.desc}</p>`;
            container.appendChild(div);
        });
    }

    window.onload = renderGallery;
</script>
</body>
</html>
